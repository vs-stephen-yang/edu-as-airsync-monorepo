pre-commit:
  parallel: true
  commands:
    format:
      run: |
        files=$(git diff --cached --name-only --diff-filter=ACM \
        | grep '\.dart$' \
        | grep -v '/generated/')

        # If any files remain, format them
        if [ -n "$files" ]; then
          dart format $files
          git add $files
        fi

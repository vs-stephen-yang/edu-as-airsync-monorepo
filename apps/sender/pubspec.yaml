  app_links: ^6.3.2
  file_picker: ^8.0.7
  window_manager: ^0.4.2
  sdp_transform: ^0.3.2
  auto_updater: ^0.2.0
  qr_flutter: ^4.1.0
  flutter_launcher_icons: ^0.14.1
  async: ^2.11.0

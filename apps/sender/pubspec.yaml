  protobuf: ^2.1.0
  provider: ^6.1.1
  sentry_flutter: ^9.8.0
  sentry_logging: ^9.8.0
  share_plus: ^10.1.4
  win32audio: ^1.4.0
  path_provider: ^2.1.4
  flutter_multi_formatter: ^2.13.0
  logging: ^1.2.0
  http: ^1.2.2
  events2: ^1.0.0
  path: ^1.9.0

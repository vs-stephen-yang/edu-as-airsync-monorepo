dependency_overrides:
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.0.0
  sentry_dart_plugin: ^3.1.0
  build_runner: ^2.4.10
  screen_retriever: ^0.2.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/
    - assets/images/
    - assets/lottie_files/
    - assets/driver/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

  fonts:
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
    - family: Inter
      fonts:
        - asset: fonts/InterVariable.ttf
    - family: NotoSansTC
      fonts:
        - asset: fonts/NotoSansTC-Regular.ttf

flutter_intl:
  enabled: true

# https://docs.sentry.io/platforms/flutter/upload-debug/#configure
sentry:
  log_level: info
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  ignore_missing: true

# https://pub.dev/packages/flutter_launcher_icons
# 1. flutter pub run flutter_launcher_icons
# 2. need remove android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml to prevent android icon become black!
# 3. using ios/Runner/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png to resize web/192 and 512 files
flutter_launcher_icons:
  image_path: "assets/icon/AirSync.png"

  android: "ic_launcher"
  min_sdk_android: 21 # android min sdk min:16, default 21

  ios: true
  remove_alpha_channel_ios: true
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/icon/AirSync.png"
  #    background_color: "#FFFFFF"
  #    theme_color: "#FFFFFF"

  windows:
    generate: true
    image_path: "assets/icon/AirSync.png"
    icon_size: 256 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/icon/AirSync.png"

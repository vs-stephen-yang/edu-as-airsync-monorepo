<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AirSync Sender for Flutter [Android(java), iOS(swift), MacOS, Web, Windows)]">

  <meta http-equiv="Content-Security-Policy" content="
          script-src 'self' 'nonce-flutter-init' 'wasm-unsafe-eval'; 
          style-src 'unsafe-inline'; 
          object-src 'none'; 
          base-uri 'self';
          form-action 'none';
        ">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AirSync Sender">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AirSync Sender</title>
  <link rel="manifest" href="manifest.json">

  <!-- This script adds the flutter initialization JS code -->
  <script nonce="flutter-init" src="flutter.js" defer></script>

  <style>
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .loading-spinner {
      animation: fade 4s;
    }

    @keyframes fade {
      0% {
        opacity: 0.2;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="center loading-spinner">
    <img src="icons/Icon-192.png">
  </div>

  <script nonce="flutter-init">
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.loader.load({
      config: {
        'entryPointBaseUrl': '',
        'canvasKitBaseUrl': '/canvaskit/',
      },
      onEntrypointLoaded: async function(engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine();
        await appRunner.runApp();
      },
      serviceWorkerSettings: {
        serviceWorkerVersion: {{flutter_service_worker_version}},
      },
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
      .then((registration) => {
        console.log('Service Worker registered with scope:', registration.scope);
      })
      .catch((error) => {
        console.log('Service Worker registration failed:', error);
      });

      navigator.serviceWorker.addEventListener('controllerchange', function () {
        console.log('New service worker activated.');

      // ✅ Prevent infinite reload loop
      if (!sessionStorage.getItem('serviceWorkerReloaded')) {
        sessionStorage.setItem('serviceWorkerReloaded', 'true');
        setTimeout(function () {
          console.log('Reloading to apply updates...');
          window.location.reload();
        }, 500); // Add slight delay
      } else {
        console.log('Skipping reload to prevent loop.');
      }
    });
  }
  </script>
</body>
</html>

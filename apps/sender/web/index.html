<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AirSync Sender for Flutter [Android(java), iOS(swift), MacOS, Web, Windows)]">

  <meta http-equiv="Content-Security-Policy" content="
          script-src 'self' 'nonce-flutter-init' 'wasm-unsafe-eval'; 
          style-src 'self'
          'sha256-lqY1z1jZBRwzSDzqmC1KrNLwTEQn5zyMIV0KJLIr+Ys='
          'sha256-zDudSZ1QIxb4NBLFkJxjz60o8wfeebMVes57tfLshz0='
          'sha256-Hcn+KfZJN1e7dqySjsmRhOqvK9vlxUF2BM4w7jfIJaE='
          'sha256-5Kh4U+mrZKxSbfNel5YEvkxCByeWhRSNJAjrMJe0/Kg=';
          object-src 'none';
          base-uri 'self';
          form-action 'none';
        ">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AirSync Sender">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>AirSync Sender</title>
  <link rel="manifest" href="manifest.json">

  <!-- This script adds the flutter initialization JS code -->
  <script nonce="flutter-init" src="flutter.js" defer></script>

  <style>
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .loading-spinner {
      animation: fade 4s;
    }

    @keyframes fade {
      0% {
        opacity: 0.2;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="center loading-spinner">
    <img src="icons/Icon-192.png">
  </div>

  <script nonce="flutter-init">
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.loader.load({
      config: {
        'entryPointBaseUrl': 'main.dart.js?v=' + {{flutter_service_worker_version}},
        'canvasKitBaseUrl': '/canvaskit/',
      },
      onEntrypointLoaded: async function(engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine();
        await appRunner.runApp();
      },
    });

    // Immediate function to handle service worker registration
    (function () {
      console.log('[APP] Page loaded, checking for service worker support');

      if (!('serviceWorker' in navigator)) {
        console.error('[APP] Service workers not supported in this browser');
        return;
      }

      navigator.serviceWorker.ready.then(registration => {
        if (registration.active) {
          console.log("[APP] Sending message to service worker on refresh...");
          registration.active.postMessage({ type: "reload" });
        }
      }).catch(error => console.error("[APP] Service worker not ready:", error));

      // Wait for page to fully load
      window.addEventListener('appinstalled', () => {
        console.log('[APP] installed, registering service worker');

        // Register the service worker
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('[APP] Service worker registration successful:', registration.scope);

            // Check if this is a new installation
            if (registration.installing) {
              const sw = registration.installing;
              console.log('[APP] Service worker installing');

              // Track installation progress
              sw.addEventListener('statechange', event => {
                console.log('[APP] Service worker state changed to:', sw.state);

                if (sw.state === 'activated') {
                  console.log('[APP] Service worker activated - checking cache');
                  checkCacheStatus();
                }
              });
            } else if (registration.active) {
              console.log('[APP] Service worker already active');
              checkCacheStatus();
            }
          })
          .catch(error => {
            console.error('[APP] Service worker registration failed:', error);
          });

        // Handle messages from the service worker
        navigator.serviceWorker.addEventListener('message', event => {
          console.log('[APP] Received message from service worker:', event.data);

          if (event.data && event.data.type === 'CACHE_STATUS') {
            console.log(`[APP] Cache contains ${event.data.count} files`);

            // If cache is empty after activation, force caching
            if (event.data.count === 0 && navigator.serviceWorker.controller) {
              console.log('[APP] Cache appears empty, forcing manual cache');
              forceCaching();
            }
          } else if (event.data && event.data.type === 'CACHE_RESULT') {
            console.log(`[APP] Manual caching ${event.data.success ? 'succeeded' : 'failed'}`);
            if (event.data.success) {
              setTimeout(checkCacheStatus, 1000);
            }
          }
        });
      });

      // Check cache status
      function checkCacheStatus() {
        console.log('[APP] Checking cache status');

        // First try direct cache check
        caches.open('flutter-app-cache')
          .then(cache => cache.keys())
          .then(requests => {
            console.log(`[APP] Direct cache check: ${requests.length} files in cache`);

            if (requests.length === 0) {
              // Cache is empty, try to force caching if we have an active service worker
              if (navigator.serviceWorker.controller) {
                console.log('[APP] Cache is empty, asking service worker to check');
                navigator.serviceWorker.controller.postMessage('CHECK_CACHE');
              } else {
                console.log('[APP] No controller, cannot verify with service worker');
              }
            }
          })
          .catch(error => {
            console.error('[APP] Error checking cache:', error);
          });
      }
    })();
  </script>
</body>

</html>

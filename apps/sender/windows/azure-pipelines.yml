trigger:
  batch: true
  branches:
    include:
      - main

variables:
  - name: Flutter.Version
    value: "3.7.12"
  - name: Flutter.Bin
    value: $(Pipeline.Workspace)/flutter/flutter/bin/flutter
  - name: AdvancedInstaller.Bin
    value: 'C:\Program Files (x86)\Caphyon\Advanced Installer 18.5\bin\x86\AdvancedInstaller.com'
  - name: Installer.Dir
    value: "$(Build.SourcesDirectory)/windows/package/"
  - name: Build.Dir
    value: "$(Build.SourcesDirectory)/build/windows/runner/Release"
  - name: Package.Bin
    value: "$(Build.SourcesDirectory)/windows/scripts/package.ps1"

pool:
  name: 'Windows Build Servers'
  demands:
  - EVKey -equals 1
steps:
- checkout: self
  persistCredentials: "true"
  lfs: "true"

# install flutter SDK
- script: curl https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_$(Flutter.Version)-stable.zip --output $(Pipeline.Workspace)/flutter.zip
  displayName: Download the flutter SDK

- task: ExtractFiles@1
  displayName: Extract the flutter SDK
  inputs:
    archiveFilePatterns: "$(Pipeline.Workspace)/flutter.zip"
    destinationFolder: "$(Pipeline.Workspace)/flutter"

# build dev
- script: $(Flutter.Bin) build windows -t ./lib/main_dev.dart
  displayName: Build dev

- task: PowerShell@2
  displayName: 'Package dev'
  inputs:
    filePath: '"$(Package.Bin)"'
    arguments: 'dev'
    pwsh: true

# copy dev
- task: CopyFiles@2
  displayName: Copy dev
  inputs:
    SourceFolder: "$(Installer.Dir)"
    contents: "**"
    targetFolder: "$(Build.ArtifactStagingDirectory)/dev/"


# build stage
- script: $(Flutter.Bin) build windows -t ./lib/main_stage.dart
  displayName: Build stage


- task: PowerShell@2
  displayName: 'Package stage'
  inputs:
    filePath: '"$(Package.Bin)"'
    arguments: 'stage'
    pwsh: true

# copy stage
- task: CopyFiles@2
  displayName: Copy stage
  inputs:
    SourceFolder: "$(Installer.Dir)"
    contents: "**"
    targetFolder: "$(Build.ArtifactStagingDirectory)/stage/"


# build prod
- script: $(Flutter.Bin) build windows -t ./lib/main_production.dart
  displayName: Build prod


- task: PowerShell@2
  displayName: 'Package prod'
  inputs:
    filePath: '"$(Package.Bin)"'
    arguments: 'prod'
    pwsh: true

# copy prod
- task: CopyFiles@2
  displayName: Copy prod
  inputs:
    SourceFolder: "$(Installer.Dir)"
    contents: "**"
    targetFolder: "$(Build.ArtifactStagingDirectory)/prod/"

# Publish artifacts
- task: PublishBuildArtifacts@1
  displayName: Publish build
  inputs:
    pathToPublish: "$(Build.ArtifactStagingDirectory)"
    Parallel: true



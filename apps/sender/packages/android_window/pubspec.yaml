name: android_window
description: A flutter plugin allows you to create native android floating window.
version: 0.0.0
homepage: https://github.com/qiuxiang/flutter-android-window

environment:
  sdk: ^3.6.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^21.0.0

flutter:
  plugin:
    platforms:
      android:
        package: qiuxiang.android_window
        pluginClass: AndroidWindowPlugin

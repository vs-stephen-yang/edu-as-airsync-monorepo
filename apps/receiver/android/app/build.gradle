plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "io.sentry.android.gradle" version "4.11.0"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Region of Signing the app for release. Do NOT EDIT.
def suffixNameExist = false
def ifpKeyExist = false
def storeKeyExist = false

def keystoreProperties = new Properties()

def propertiesFile = rootProject.file('../../keystore.properties')

if (propertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(propertiesFile))

    // Check suffix name settings is exist or not. This settings only available in debug mode!
    suffixNameExist = keystoreProperties.getProperty("suffixName") != null
    // Check each key settings is exist or not.
    ifpKeyExist = keystoreProperties.getProperty("ifpStoreFile") != null
    storeKeyExist = keystoreProperties.getProperty("storeStoreFile") != null
}
// End of Region of Signing the app for release. Do NOT EDIT.

android {
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion "23.2.8568313"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // Region of Signing the app for release. Do NOT EDIT.
    signingConfigs {
        if (ifpKeyExist) {
            IFP {
                storeFile file(keystoreProperties['ifpStoreFile'])
                storePassword keystoreProperties['ifpStorePassword']
                keyAlias keystoreProperties['ifpKeyAlias']
                keyPassword keystoreProperties['ifpKeyPassword']
            }
        }
        if (storeKeyExist) {
            STORE {
                storeFile file(keystoreProperties['storeStoreFile'])
                storePassword keystoreProperties['storeStorePassword']
                keyAlias keystoreProperties['storeKeyAlias']
                keyPassword keystoreProperties['storeKeyPassword']
            }
        }
    }
    // End of Region of Signing the app for release. Do NOT EDIT.

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.mvbcast.crosswalk"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        // https://developer.android.com/studio/build/build-variants#resolve_matching_errors
        missingDimensionStrategy 'distribute', 'googlePlay'
    }

    flavorDimensions("channel", "stage")
    productFlavors {
        edla {
            dimension "channel"
        }
        ifp {
            dimension "channel"
        }
        open {
            dimension "channel"
        }
        store {
            dimension "channel"
        }
        dev {
            dimension "stage"
            versionNameSuffix "-d"
        }
        stage {
            dimension "stage"
            versionNameSuffix "-s"
        }
        production {
            dimension "stage"
            versionCode android.defaultConfig.versionCode + 1
        }
    }

    sourceSets {
        // "open" use same source code with "ifp"
        open.java.srcDir "src/ifp/java"
    }

    buildTypes {
        debug {
            if (ifpKeyExist) {
                signingConfig signingConfigs.IFP
            }
            if (suffixNameExist) {
                applicationIdSuffix keystoreProperties["suffixName"]
            }
        }
        profile {
            if (ifpKeyExist) {
                signingConfig signingConfigs.IFP
            }
        }
        release {
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            productFlavors {
                edla {
                    if (ifpKeyExist) {
                        signingConfig signingConfigs.IFP
                    } else {
                        signingConfig signingConfigs.debug
                    }
                }
                ifp {
                    if (ifpKeyExist) {
                        signingConfig signingConfigs.IFP
                    } else {
                        signingConfig signingConfigs.debug
                    }
                }
                open {
                    if (storeKeyExist) {
                        signingConfig signingConfigs.STORE
                    } else {
                        signingConfig signingConfigs.debug
                    }
                }
                store {
                    if (storeKeyExist) {
                        signingConfig signingConfigs.STORE
                    } else {
                        signingConfig signingConfigs.debug
                    }
                }
            }
        }
    }
    lint {
        checkReleaseBuilds false
    }

    packagingOptions {
        pickFirst '**/libairplayreceiver.so'
        pickFirst '**/libevent*.so'
        pickFirst '**/libcast.so'
        pickFirst '**/liblog.so'
        // see: https://issuetracker.google.com/issues/299314630?pli=1
        resources.excludes.add("META-INF/LICENSE.md")
        resources.excludes.add("META-INF/LICENSE-notice.md")
    }

    buildFeatures {
        aidl true
    }
}

dependencies {
    implementation fileTree(include: ['*.aar'], dir: 'libs')
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
//    implementation project(path: ':libwebrtc')
//    implementation project(':base')
//    implementation project(':p2p')
    implementation 'com.squareup.okhttp3:okhttp:4.9.1'
    implementation('io.socket:socket.io-client:1.0.1') {
        // excluding org.json which is provided by Android
        exclude group: 'org.json', module: 'json'
    }
    // region vbsOTA
    implementation 'com.github.tonyofrancis:fetch:3.0.3'
    implementation 'io.reactivex.rxjava2:rxjava:2.2.19'
    // endregion

    // region FireBase for "store"
    storeImplementation 'com.google.firebase:firebase-core:21.1.1'
    // *** Use 21.1.0 may cause "Remote Config HTTP errors for some RTL locales" ***
    // https://github.com/firebase/firebase-android-sdk/issues/3757
    storeImplementation 'com.google.firebase:firebase-config:21.4.1'
    // endregion

    implementation 'com.google.android.gms:play-services-base:18.2.0'
    implementation 'io.sentry:sentry-android:8.0.0-beta.2'

    // import vsapi
    compileOnly files("src/libs/VSApi-release.aar")
    implementation files("src/libs/VSApiCompat-release.aar")
}

flutter {
    source '../..'
}

// https://docs.sentry.io/platforms/android/configuration/gradle/#configure
sentry {
    // Disables or enables debug log output
    debug = true

    org = System.getenv("SENTRY_ORG")
    projectName = System.getenv("SENTRY_PROJECT")
    authToken = System.getenv("SENTRY_AUTH_TOKEN")

    includeProguardMapping = System.getenv('SENTRY_AUTH_TOKEN') != null

    uploadNativeSymbols = System.getenv('SENTRY_AUTH_TOKEN') != null

    includeNativeSources = System.getenv('SENTRY_AUTH_TOKEN') != null

    includeSourceContext = System.getenv('SENTRY_AUTH_TOKEN') != null
}
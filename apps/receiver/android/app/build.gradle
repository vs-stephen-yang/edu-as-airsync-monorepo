def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    compileSdkVersion rootProject.ext.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.mvbcast.crosswalk"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        // https://developer.android.com/studio/build/build-variants#resolve_matching_errors
        missingDimensionStrategy 'distribute', 'googlePlay'
    }

    flavorDimensions("channel", "stage")
    productFlavors {
        ifp {
            dimension "channel"
        }
        open {
            dimension "channel"
        }
        store {
            dimension "channel"
        }
        dev {
            dimension "stage"
            versionNameSuffix "-d"
        }
        stage {
            dimension "stage"
            versionNameSuffix "-s"
        }
        production {
            dimension "stage"
            versionCode android.defaultConfig.versionCode + 1
        }
    }

    sourceSets {
        // "open" use same source code with "ifp"
        open.java.srcDir "src/ifp/java"
    }

    buildTypes {
        release {
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
    lint {
        checkReleaseBuilds false
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.5.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation project(path: ':libwebrtc')
    implementation project(':base')
    implementation project(':p2p')
    implementation 'com.squareup.okhttp3:okhttp:4.9.1'
    implementation('io.socket:socket.io-client:1.0.1') {
        // excluding org.json which is provided by Android
        exclude group: 'org.json', module: 'json'
    }
    // region vbsOTA
    implementation 'com.tonyodev.fetch2:fetch2:3.0.3'
    implementation 'io.reactivex.rxjava2:rxjava:2.2.19'
    // endregion

    // region FireBase for "store"
    storeImplementation 'com.google.firebase:firebase-core:21.1.1'
    // *** Use 21.1.0 may cause "Remote Config HTTP errors for some RTL locales" ***
    // https://github.com/firebase/firebase-android-sdk/issues/3757
    storeImplementation 'com.google.firebase:firebase-config:21.2.0'
    // endregion

    // region SystemAPI
    implementation files('libs/systemapi-debug-1.3.2.aar')
    // endregion
}

flutter {
    source '../..'
}

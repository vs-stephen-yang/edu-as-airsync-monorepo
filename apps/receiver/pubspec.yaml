name: display_flutter
description: AirSync for Flutter [Android(java), iOS(swift), MacOS, Web, Windows)]

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 3.5.3+305007

environment:
  sdk: '>=3.1.2 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  in_app_update: ^4.2.3
  no_context_navigation: ^2.1.2
  shared_preferences: ^2.3.2
  package_info_plus: ^6.0.0
  device_info_plus: ^10.1.2
  encrypt: ^5.0.3
  path: ^1.9.0
  uuid: ^4.5.0
  http: ^1.2.1
  path_provider: ^2.1.4
  http_parser: ^4.0.2
  intl: ^0.19.0
  flutter_bloc: ^8.1.6
  socket_io_client: ^1.0.2
  qr_flutter: ^4.1.0
  flutter_svg_provider: ^1.0.7
  rxdart: ^0.27.7
  easy_debounce: ^2.0.3
  flutter_appcenter_bundle:
    path: ./plugin/flutter_appcenter_bundle-3.3.2
  auto_size_text: ^3.0.0
  provider: ^6.1.2
  crypto: ^3.0.5
  logging: ^1.2.0
  protobuf: ^2.1.0
  move_to_background: ^1.0.2
  sprintf: ^7.0.0
  connectivity_plus: ^5.0.1
  network_info_plus: ^2.1.0
  flutter_background: ^1.3.0+1
  azure_application_insights: ^4.0.1
  gap: ^3.0.1
  bonsoir: ^5.1.10
  window_size:
    git:
      url: https://github.com/google/flutter-desktop-embedding.git
      path: plugins/window_size
  motion_toast: ^2.11.0
  dropdown_button2: ^2.3.8
  flutter_riverpod: ^2.0.0
  lottie: ^3.1.2
  figma2flutter: ^0.3.0-alpha
  flutter_oss_licenses: ^3.0.2

  # ViewSonic plug-in
  app_ota_flutter:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/App_OTA_Flutter
      ref: 1.0.4
  device_info_vs:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/Device_Info_VS
      ref: 1.1.2
  flutter_webrtc:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/flutter-webrtc
      ref: release-0.9.36-40
  display_channel:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/display-channel
      ref: release-3.5.2
  ion_sdk_flutter:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/ion-sdk-flutter
      ref: release-0.0.33
  flutter_input_injection:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/flutter-input-injection
      ref: release-0.7.0
  flutter_ion_sfu:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/flutter-ion-sfu
      ref: release-0.0.6
  flutter_mirror:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/flutter-mirror
      ref: release-0.33.0
  android_window:
    git:
      url: https://viewsonic-ssi.visualstudio.com/Display%20App/_git/flutter-android-window
      ref: v0.4.0-8
  # ViewSonic plug-in

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^3.0.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/
    - assets/images/
    - assets/channel/
    - assets/lottie_files/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
  fonts:
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf
    - family: Inconsolata
      fonts:
        - asset: fonts/Inconsolata-Regular.ttf
    - family: Inter
      fonts:
        - asset: fonts/InterVariable.ttf

flutter_intl:
  enabled: true

trigger:
  batch: true
  branches:
    include:
      - master

pool:
  vmImage: macos-latest

variables:
  - name: Flutter.Version
    value: "3.27.4"
  - name: Flutter.Bin
    value: $(Pipeline.Workspace)/flutter/flutter/bin/flutter
  - name: FlutterSdkPlatform
    value: "macos"
  - name: PUB_CACHE
    value: $(Pipeline.Workspace)/.pub-cache
  - name: GRADLE_USER_HOME
    value: $(Pipeline.Workspace)/.gradle

jobs:
  - job: Build
    strategy:
      matrix:
        openproduction:
          flavor: "open-production"
          buildOptions: "--flavor openproduction -t lib/main_production.dart"
    steps:
      - checkout: self
        persistCredentials: "true"
        lfs: "true"

      - task: PowerShell@2
        displayName: Authenticates git repos
        inputs:
          targetType: "inline"
          script: |
            $header = "AUTHORIZATION: bearer $(System.AccessToken)"
            git config --global http.https://viewsonic-ssi.visualstudio.com/Display%20App/.extraheader $header

      - task: JavaToolInstaller@0
        inputs:
          versionSpec: "17"
          jdkArchitectureOption: "x64"
          jdkSourceOption: "PreInstalled"

      - script: curl https://storage.googleapis.com/flutter_infra_release/releases/stable/$(FlutterSdkPlatform)/flutter_$(FlutterSdkPlatform)_$(Flutter.Version)-stable.zip --output $(Pipeline.Workspace)/flutter.zip
        displayName: Download the flutter SDK

      - task: ExtractFiles@1
        displayName: Extract the flutter SDK
        inputs:
          archiveFilePatterns: "$(Pipeline.Workspace)/flutter.zip"
          destinationFolder: "$(Pipeline.Workspace)/flutter"

      - task: MavenAuthenticate@0
        displayName: "Provides maven credentials for Azure Artifacts"
        inputs:
          artifactsFeeds: "myViewBoard_Artifacts"

      - task: PowerShell@2
        displayName: Extract the credentials of Azure Artifacts
        inputs:
          targetType: "inline"
          script: |
            [xml]$doc = Get-Content -path ~/.m2/settings.xml
            $username=$doc.settings.servers.server.username
            $password=$doc.settings.servers.server.password
            Write-Host "##vso[task.setvariable variable=artifacts.username]$username"
            Write-Host "##vso[task.setvariable variable=artifacts.password;issecret=true]$password"

      - task: Cache@2
        enabled: "false"
        displayName: Configure Gradle caching
        inputs:
          key: 'gradle | "$(Agent.OS)" | **/build.gradle'
          restoreKeys: |
            gradle | "$(Agent.OS)"
            gradle
          path: $(GRADLE_USER_HOME)

      - script: $(Flutter.Bin) analyze --no-fatal-infos
        displayName: Run lint checks
        workingDirectory: "$(Build.SourcesDirectory)"

      - script: $(Flutter.Bin) build apk $(buildOptions)
        displayName: Build App
        workingDirectory: "$(Build.SourcesDirectory)"
        env:
          GRADLE_OPTS: "-Dorg.gradle.caching=true"
          ORG_GRADLE_PROJECT_AZURE_ARTIFACTS_USERNAME: $(artifacts.username)
          ORG_GRADLE_PROJECT_AZURE_ARTIFACTS_PASSWORD: $(artifacts.password)

      - script: ./gradlew --stop
        displayName: Stop Gradle daemon
        workingDirectory: "$(Build.SourcesDirectory)/android/"

trigger:
  batch: true
  branches:
    include:
      - main
      - HotFix/*

pr: none

pool:
  name: "AirSync macOS Pool"

variables:
  - name: Flutter.Bin
    value: fvm flutter
  - name: Dart.Bin
    value: fvm dart
  - group: "sentry-airsync-sender"
  - group: "github-secrets"

jobs:
  - job: Build
    strategy:
      matrix:
        dev:
          flavor: 'dev'
          buildOptions: '-t ./lib/main_dev.dart --source-maps --pwa-strategy=none'
        stage:
          flavor: 'stage'
          buildOptions: '--release -t ./lib/main_stage.dart --source-maps --pwa-strategy=none'
        prod:
          flavor: 'prod'
          buildOptions: '--release -t ./lib/main_production.dart --source-maps --pwa-strategy=none'

    steps:
      - checkout: self
        persistCredentials: "true"
        lfs: "true"
        clean: true

      - task: PowerShell@2
        displayName: Authenticates git repos
        inputs:
          targetType: 'inline'
          script: |
            $header = "AUTHORIZATION: bearer $(System.AccessToken)"
            git config --global http.https://viewsonic-ssi.visualstudio.com/Display%20App/.extraheader $header

      - task: PowerShell@2
        displayName: Clean previous build artifacts
        inputs:
          targetType: 'inline'
          script: |
            Write-Host "Cleaning build artifacts..."

            # Clean build outputs
            if (Test-Path "build") {
              Remove-Item -Path "build" -Recurse -Force
              Write-Host "Removed build/ directory"
            }

            # Clean dart tool
            if (Test-Path ".dart_tool") {
              Remove-Item -Path ".dart_tool" -Recurse -Force
              Write-Host "Removed .dart_tool/ directory"
            }

            # Clean staging directory
            if (Test-Path "$(Build.ArtifactStagingDirectory)") {
              Remove-Item -Path "$(Build.ArtifactStagingDirectory)/*" -Recurse -Force
              Write-Host "Cleaned ArtifactStagingDirectory"
            }

            Write-Host "Cleanup completed"

      - script: |
          git config --global url."https://$(GITHUB_PAT)@github.com/".insteadOf "https://github.com/"
        displayName: Configure GitHub credentials
      - script: $(Flutter.Bin) pub get
        displayName: Download packages

      - script: $(Flutter.Bin) analyze --no-pub --no-fatal-infos
        enabled: false
        displayName: Run lint checks

      # Build
      - script: $(Flutter.Bin) build web --no-pub $(buildOptions)
        displayName: Build

      # Uploading debug symbols
      - script: $(Flutter.Bin) packages pub run sentry_dart_plugin
        displayName: Uploading debug symbols
        enabled: "true"
        env:
          SENTRY_AUTH_TOKEN: $(SENTRY_AUTH_TOKEN)
          SENTRY_ORG: $(SENTRY_ORG)
          SENTRY_PROJECT: $(SENTRY_PROJECT)

      # Overwrite service-worker RESOURCES
      - script: $(Dart.Bin) $(Build.SourcesDirectory)/web/generate_assets.dart
        displayName: Generate resources list

      # Prepare to publish
      - task: CopyFiles@2
        displayName: Copy artifacts
        inputs:
          SourceFolder: "$(Build.SourcesDirectory)/build/web"
          contents: |
            **
            !**/*.js.map
          targetFolder: "$(Build.ArtifactStagingDirectory)"

      - task: PublishPipelineArtifact@1
        displayName: Publish Build Artifact
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)"
          artifact: $(flavor)

      # Clean up build artifacts after publishing
      - task: PowerShell@2
        displayName: Clean up build artifacts after publishing
        condition: always()
        inputs:
          targetType: 'inline'
          script: |
            Write-Host "Cleaning up after build..."

            # Clean build outputs
            if (Test-Path "build") {
              Remove-Item -Path "build" -Recurse -Force
              Write-Host "Removed build/ directory"
            }

            # Clean staging directory
            if (Test-Path "$(Build.ArtifactStagingDirectory)") {
              Remove-Item -Path "$(Build.ArtifactStagingDirectory)/*" -Recurse -Force
              Write-Host "Cleaned ArtifactStagingDirectory"
            }

            Write-Host "Post-build cleanup completed"
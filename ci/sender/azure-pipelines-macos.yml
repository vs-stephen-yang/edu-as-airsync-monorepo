# Azure Pipelines — Flutter macOS app (parity with iOS, with fixed submodule auth)
trigger:
  tags:
    include: ['*']
pr: none

parameters:
  - name: PoolName
    type: string
    default: 'AirSync macOS Pool'
  - name: BuildDev
    type: boolean
    default: false
  - name: BuildStage
    type: boolean
    default: true
  - name: BuildProduction
    type: boolean
    default: true
  - name: UseDropboxUpload
    type: boolean
    default: false
  - name: UseSentryUpload
    type: boolean
    default: false

variables:
  Flutter.Bin: 'fvm flutter'
  Split.Debug.Root: 'build/debug-info'
  Flutter.Build.Options: '--obfuscate'
  Artifact.Root: '$(Build.ArtifactStagingDirectory)'
  Src.Root: '$(Build.SourcesDirectory)'
  # Sentry
  Sentry.Org: ''
  Sentry.Project: ''
  Sentry.Auth.Token: ''
  # Dropbox
  Dropbox.DestPath: ''

stages:
- stage: QualityCheck
  displayName: 'Quality Check (analyze + tests + coverage)'
  jobs:
  - job: Quality
    pool: { name: ${{ parameters.PoolName }} }
    steps:
      - checkout: self
        persistCredentials: true
        submodules: false
        clean: true

      - bash: |
          set -euo pipefail
          git config --unset-all http.https://dev.azure.com.extraheader || true
          git config --unset-all http.https://viewsonic-ssi.visualstudio.com.extraheader || true
          git config http.https://dev.azure.com.extraheader "AUTHORIZATION: bearer $(System.AccessToken)"
          git config http.https://viewsonic-ssi.visualstudio.com.extraheader "AUTHORIZATION: bearer $(System.AccessToken)"
          git submodule sync --recursive
          git -c http.extraheader="AUTHORIZATION: bearer $(System.AccessToken)" submodule update --init --force --recursive --depth=1
        displayName: 'Prepare Git auth & submodules'

      - bash: |
          set -euo pipefail
          if [ -n "${GIT_USER:-}" ] && [ -n "${GIT_PAT:-}" ]; then
            {
              echo "machine viewsonic-ssi.visualstudio.com"
              echo "  login ${GIT_USER}"
              echo "  password ${GIT_PAT}"
            } > ~/.netrc
            chmod 0600 ~/.netrc
          else
            echo "##vso[task.logissue type=warning].netrc not configured (GIT_USER/GIT_PAT empty)"
          fi
        displayName: 'Configure Git credentials (.netrc)'
        env:
          GIT_USER: $(GIT_USER)
          GIT_PAT: $(GIT_PAT)

      - bash: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "##vso[task.prependpath]$HOME/.cargo/bin"
          fi
          rustup toolchain install stable
          rustup default stable
          rustup target add aarch64-apple-darwin
          rustc -V
          cargo -V
        displayName: 'Install Rust (stable + aarch64 target)'

      - bash: |
          set -euo pipefail
          ${FLUTTER_BIN} --version
          ${FLUTTER_BIN} pub get
          ${FLUTTER_BIN} analyze
          ${FLUTTER_BIN} test --coverage
        env: { FLUTTER_BIN: $(Flutter.Bin) }
        displayName: 'Flutter analyze & test (coverage)'
        workingDirectory: $(Build.SourcesDirectory)

      - task: PublishBuildArtifacts@1
        displayName: 'Publish coverage artifact'
        inputs:
          PathtoPublish: '$(Build.SourcesDirectory)/coverage'
          ArtifactName: 'coverage'
          publishLocation: 'Container'

- stage: Build
  dependsOn: QualityCheck
  displayName: 'Build macOS app'
  jobs:
  - job: BuildMatrix
    pool: { name: ${{ parameters.PoolName }} }
    strategy:
      maxParallel: 3
      matrix:
        ${{ if eq(parameters.BuildDev, true) }}:
          dev: { BuildEnv: 'dev', BuildConfig: 'Release-Dev', TargetDart: 'lib/main_dev.dart' }
        ${{ if eq(parameters.BuildStage, true) }}:
          stage: { BuildEnv: 'stage', BuildConfig: 'Release-Stage', TargetDart: 'lib/main_stage.dart' }
        ${{ if eq(parameters.BuildProduction, true) }}:
          production: { BuildEnv: 'production', BuildConfig: 'Release-Store', TargetDart: 'lib/main_production.dart' }
    steps:
      - checkout: self
        persistCredentials: true
        submodules: false
        clean: true

      - bash: |
          set -euo pipefail
          git config --unset-all http.https://dev.azure.com.extraheader || true
          git config --unset-all http.https://viewsonic-ssi.visualstudio.com.extraheader || true
          git config http.https://dev.azure.com.extraheader "AUTHORIZATION: bearer $(System.AccessToken)"
          git config http.https://viewsonic-ssi.visualstudio.com.extraheader "AUTHORIZATION: bearer $(System.AccessToken)"
          git submodule sync --recursive
          git -c http.extraheader="AUTHORIZATION: bearer $(System.AccessToken)" submodule update --init --force --recursive --depth=1
        displayName: 'Prepare Git auth & submodules'

      - bash: |
          set -euo pipefail
          cd "$(Build.SourcesDirectory)"
          raw="$(grep -E '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          name="${raw%%+*}"
          code="${raw#*+}"
          if [ "$code" = "$raw" ]; then code="0"; fi
          if [ "$(BuildEnv)" = "production" ]; then code="$((code + 1))"; fi
          echo "Resolved version: name=${name} code=${code} (env=$(BuildEnv))"
          echo "##vso[task.setvariable variable=APP_VERSION_NAME]$name"
          echo "##vso[task.setvariable variable=APP_VERSION_CODE]$code"
          echo "##vso[task.setvariable variable=RELEASE_NAME]${name}+${code}"
        displayName: 'Resolve version from pubspec.yaml'

      - bash: |
          set -euo pipefail
          chmod +x scripts/macos/build_macos_app.sh
          outdir="$(Artifact.Root)/$(BuildEnv)"
          mkdir -p "$outdir"
          scripts/macos/build_macos_app.sh "$(BuildEnv)" "$(APP_VERSION_NAME)" "$(APP_VERSION_CODE)" "$outdir"
        displayName: 'Build macOS app'
        env:
          FLUTTER_BIN: $(Flutter.Bin)
          SPLIT_DEBUG_ROOT: $(Split.Debug.Root)
        workingDirectory: $(Build.SourcesDirectory)

      - ${{ if eq(parameters.UseSentryUpload, true) }}:
        - bash: |
            set -euo pipefail
            FLAVOR="$(BuildConfig)"; FLAVOR="${FLAVOR#Release-}"
            SRC_DIR="$(Build.SourcesDirectory)/$(Split.Debug.Root)/${FLAVOR}"
            echo "Uploading Dart symbols from: ${SRC_DIR}"
            if [ -d "${SRC_DIR}" ]; then
              ${FLUTTER_BIN} pub run sentry_dart_plugin                 --include-sources --upload-sources                 --release "$(RELEASE_NAME)"                 --org "$(SENTRY_ORG)" --project "$(SENTRY_PROJECT)"                 --auth-token "$(SENTRY_AUTH_TOKEN)"                 -p macos "${SRC_DIR}"
            else
              echo "##vso[task.logissue type=warning]Split debug info directory not found: ${SRC_DIR}"
            fi
          env:
            FLUTTER_BIN: $(Flutter.Bin)
            SENTRY_ORG: $(Sentry.Org)
            SENTRY_PROJECT: $(Sentry.Project)
            SENTRY_AUTH_TOKEN: $(Sentry.Auth.Token)
            RELEASE_NAME: $(RELEASE_NAME)
          displayName: 'Upload Dart debug symbols to Sentry'

      - bash: |
          set -euo pipefail
          ARTIFACT_DIR="$(Artifact.Root)/$(BuildEnv)"
          echo "Artifacts in: $ARTIFACT_DIR"
          shopt -s nullglob
          found=false
          for z in "$ARTIFACT_DIR"/*.zip; do
            echo "  - $(basename "$z")"
            found=true
          done
          if compgen -G "$ARTIFACT_DIR"/*.xcarchive > /dev/null; then
            for d in "$ARTIFACT_DIR"/*.xcarchive; do
              [ -d "$d" ] && echo "  - $(basename "$d") (xcarchive)"
              found=true
            done
          fi
          if [ "$found" = false ]; then
            echo "##vso[task.logissue type=warning]No artifacts found in $ARTIFACT_DIR"
          fi
        displayName: 'Display Build Artifacts'

      - task: PublishBuildArtifacts@1
        displayName: 'Publish artifacts'
        inputs:
          PathtoPublish: '$(Artifact.Root)/$(BuildEnv)'
          ArtifactName: 'macos-$(BuildEnv)'
          publishLocation: 'Container'

      - ${{ if eq(parameters.UseDropboxUpload, true) }}:
        - template: ci/upload-to-dropbox.yml
          parameters:
            file1: '$(Artifact.Root)/$(BuildEnv)/*.zip'
            dir1: '$(Artifact.Root)/$(BuildEnv)/*.xcarchive'
            destPath: '$(Dropbox.DestPath)'

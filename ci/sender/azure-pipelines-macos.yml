#          platform: macOS
#          envName: $(envName)
#          versionName: $(APP_VERSION_NAME)
#          runNumber: $(Build.BuildNumber)
#          dir1: "$(Build.ArtifactStagingDirectory)/macos/$(APP_FILE_NAME)"
#          dir1_subfolder: "app_$(envName)"
#          file1: "$(Build.ArtifactStagingDirectory)/macos/$(ARCHIVE_TAR_NAME)"

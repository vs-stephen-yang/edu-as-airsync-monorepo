# Azure Pipelines for Flutter macOS app (Display Cast / AirSync Sender)
# - Builds Dev / Stage / Production (Store) flavors
# - Uses a reusable build script: scripts/macos/build_macos_app.sh
# - Publishes .app (zipped) and .xcarchive as artifacts
# - Optional manual codesign of Sparkle bits + optional notarization + optional Sentry dSYM upload
#
# How to use:
# 1) Put this file at the repo root as `azure-pipelines.yml` (or keep the name you like).
# 2) Ensure `scripts/macos/build_macos_app.sh` is committed and executable.
# 3) Set pipeline variables as needed (see "Variables" below).

# ----------------------------
# Triggers
# ----------------------------
trigger:
  tags:
    include:
      - '*'
pr: none

# ----------------------------
# Parameters
# ----------------------------
parameters:
  - name: poolName
    displayName: 'Agent pool name'
    type: string
    default: 'AirSync macOS Pool'   # change to 'macos-latest' if you use Microsoft-hosted agents
  - name: buildDev
    displayName: 'Build Dev'
    type: boolean
    default: false
  - name: buildStage
    displayName: 'Build Stage'
    type: boolean
    default: false
  - name: buildProduction
    displayName: 'Build Production (Store)'
    type: boolean
    default: true
  - name: manualCodesignSparkle
    displayName: 'Manually codesign Sparkle components'
    type: boolean
    default: true
  - name: notarize
    displayName: 'Submit notarization (requires Apple creds)'
    type: boolean
    default: false
  - name: sentryUpload
    displayName: 'Upload dSYMs to Sentry (requires Sentry creds)'
    type: boolean
    default: false

# ----------------------------
# Global variables (safe defaults). Override in pipeline UI or variable groups.
# ----------------------------
variables:
  # Flutter setup
  FLUTTER_CHANNEL: 'stable'
  FLUTTER_VERSION: ''   # leave empty for latest channel
  # Signing + Notarization
  MACOS_SIGN_IDENTITY: 'Developer ID Application: ViewSonic International Corp. (AVR9NC3MVW)'
  MACOS_TEAM_ID: 'AVR9NC3MVW'
  APPLE_ID: ''                 # e.g. appleid@example.com (required if notarize=true)
  NOTARY_KEYCHAIN_PROFILE: ''  # name configured via `xcrun notarytool store-credentials`
  # Sentry
  SENTRY_AUTH_TOKEN: ''        # required if sentryUpload=true
  SENTRY_ORG: ''
  SENTRY_PROJECT: ''
  # Paths
  ARTIFACT_DIR: '$(Build.ArtifactStagingDirectory)'
  SRC_DIR: '$(Build.SourcesDirectory)'

# ----------------------------
# Template for a build job (reused for each environment)
# ----------------------------
stages:
  - stage: Build
    displayName: 'Build macOS app'
    jobs:
      # Dev
      - job: dev
        displayName: 'Build • Dev'
        condition: and(succeeded(), eq(${{ parameters.buildDev }}, true))
        pool:
          name: ${{ parameters.poolName }}
        steps:
          - checkout: self
            submodules: true

          - bash: |
              set -euo pipefail
              echo "Installing Flutter ($FLUTTER_CHANNEL $FLUTTER_VERSION) ..."
              TOOL_DIR="$AGENT_TOOLSDIRECTORY/flutter"
              if [ ! -d "$TOOL_DIR" ]; then
                mkdir -p "$TOOL_DIR"
              fi
              cd "$TOOL_DIR"
              if [ ! -d "sdk" ]; then
                git clone https://github.com/flutter/flutter.git sdk
              fi
              cd sdk
              git fetch --all --tags
              git checkout ${FLUTTER_VERSION:-$FLUTTER_CHANNEL}
              echo "##vso[task.prependpath]$TOOL_DIR/sdk/bin"
              flutter --version
              flutter doctor -v
              flutter precache --macos
            displayName: 'Install Flutter SDK'

          - bash: |
              set -euo pipefail
              cd "$(SRC_DIR)"
              flutter pub get
              cd macos
              pod install --repo-update
            workingDirectory: $(Build.SourcesDirectory)
            displayName: 'Flutter deps & CocoaPods'

          - bash: |
              set -euo pipefail
              chmod +x scripts/macos/build_macos_app.sh
              scripts/macos/build_macos_app.sh dev "" "" "$(ARTIFACT_DIR)/dev"             --manual-codesign-sparkle=${{ parameters.manualCodesignSparkle }}             --notarize=${{ parameters.notarize }}             --sentry-upload=${{ parameters.sentryUpload }}
            workingDirectory: $(Build.SourcesDirectory)
            displayName: 'Build Dev'

          - publish: $(Build.ArtifactStagingDirectory)/dev
            artifact: macos-dev

      # Stage
      - job: stage
        displayName: 'Build • Stage'
        condition: and(succeeded(), eq(${{ parameters.buildStage }}, true))
        pool:
          name: ${{ parameters.poolName }}
        steps:
          - checkout: self
            submodules: true

          - bash: |
              set -euo pipefail
              echo "Installing Flutter ($FLUTTER_CHANNEL $FLUTTER_VERSION) ..."
              TOOL_DIR="$AGENT_TOOLSDIRECTORY/flutter"
              if [ ! -d "$TOOL_DIR" ]; then
                mkdir -p "$TOOL_DIR"
              fi
              cd "$TOOL_DIR"
              if [ ! -d "sdk" ]; then
                git clone https://github.com/flutter/flutter.git sdk
              fi
              cd sdk
              git fetch --all --tags
              git checkout ${FLUTTER_VERSION:-$FLUTTER_CHANNEL}
              echo "##vso[task.prependpath]$TOOL_DIR/sdk/bin"
              flutter --version
              flutter doctor -v
              flutter precache --macos
            displayName: 'Install Flutter SDK'

          - bash: |
              set -euo pipefail
              cd "$(SRC_DIR)"
              flutter pub get
              cd macos
              pod install --repo-update
            workingDirectory: $(Build.SourcesDirectory)
            displayName: 'Flutter deps & CocoaPods'

          - bash: |
              set -euo pipefail
              chmod +x scripts/macos/build_macos_app.sh
              scripts/macos/build_macos_app.sh stage "" "" "$(ARTIFACT_DIR)/stage"             --manual-codesign-sparkle=${{ parameters.manualCodesignSparkle }}             --notarize=${{ parameters.notarize }}             --sentry-upload=${{ parameters.sentryUpload }}
            workingDirectory: $(Build.SourcesDirectory)
            displayName: 'Build Stage'

          - publish: $(Build.ArtifactStagingDirectory)/stage
            artifact: macos-stage

      # Production (Store)
      - job: production
        displayName: 'Build • Production (Store)'
        condition: and(succeeded(), eq(${{ parameters.buildProduction }}, true))
        pool:
          name: ${{ parameters.poolName }}
        steps:
          - checkout: self
            submodules: true

          - bash: |
              set -euo pipefail
              echo "Installing Flutter ($FLUTTER_CHANNEL $FLUTTER_VERSION) ..."
              TOOL_DIR="$AGENT_TOOLSDIRECTORY/flutter"
              if [ ! -d "$TOOL_DIR" ]; then
                mkdir -p "$TOOL_DIR"
              fi
              cd "$TOOL_DIR"
              if [ ! -d "sdk" ]; then
                git clone https://github.com/flutter/flutter.git sdk
              fi
              cd sdk
              git fetch --all --tags
              git checkout ${FLUTTER_VERSION:-$FLUTTER_CHANNEL}
              echo "##vso[task.prependpath]$TOOL_DIR/sdk/bin"
              flutter --version
              flutter doctor -v
              flutter precache --macos
            displayName: 'Install Flutter SDK'

          - bash: |
              set -euo pipefail
              cd "$(SRC_DIR)"
              flutter pub get
              cd macos
              pod install --repo-update
            workingDirectory: $(Build.SourcesDirectory)
            displayName: 'Flutter deps & CocoaPods'

          - bash: |
              set -euo pipefail
              chmod +x scripts/macos/build_macos_app.sh
              scripts/macos/build_macos_app.sh production "" "" "$(ARTIFACT_DIR)/production"             --manual-codesign-sparkle=${{ parameters.manualCodesignSparkle }}             --notarize=${{ parameters.notarize }}             --sentry-upload=${{ parameters.sentryUpload }}
            workingDirectory: $(Build.SourcesDirectory)
            displayName: 'Build Production (Store)'

          - publish: $(Build.ArtifactStagingDirectory)/production
            artifact: macos-production

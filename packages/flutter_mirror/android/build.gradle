group 'com.viewsonic.flutter_mirror'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
        maven {
          url 'https://viewsonic-ssi.pkgs.visualstudio.com/_packaging/myViewBoard_Artifacts/maven/v1'
          name 'myViewBoard_Artifacts'
          authentication {
              basic(BasicAuthentication)
          }
          credentials {
              username project.AZURE_ARTIFACTS_USERNAME
              password project.AZURE_ARTIFACTS_PASSWORD
          }
        }
    }
}

apply plugin: 'com.android.library'

android {
    compileSdkVersion 33
    ndkVersion '23.2.8568313'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion 21
        externalNativeBuild {
            cmake {
                abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }
    buildFeatures {
        prefab true
    }

    testOptions {
      unitTests.all {
        useJUnitPlatform {
          // excludeTags 'slow'
        }
      }
    }
}

dependencies {
    implementation 'com.google.oboe:oboe:1.7.0'
    implementation 'com.viewsonic.airplay:airplay:0.15.0'
    implementation 'com.viewsonic.googlecast:googlecast:0.9.2'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'
    testImplementation 'org.mockito:mockito-core:5.5.0'
}
